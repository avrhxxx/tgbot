version: "3.8"

services:
  bot:
    build: .
    container_name: shadow_bot
    restart: unless-stopped
    depends_on:
      - searxng
    environment:
      - SEARX_URL=http://searxng:8080

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8080:8080"